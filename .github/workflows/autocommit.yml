name: Auto commit

on:
  push:
    branches:
      - main 
      
  schedule:
  - cron: "11 01 * * *" # See https://crontab.guru/

jobs:
  auto_commit:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
      - uses: actions/checkout@v4      
        with:
         persist-credentials: true 
         fetch-depth: 0

      - name: Modify last update
        run: |
          d=`date '+%Y-%m-%dT%H:%M:%SZ'`
          echo $d > LAST_UPDATED
          
      - name: Commit changes
        run: |
          git config --local user.email "876321750@qq.com"
          git config --local user.name "Zeraphyms"
          git add -A
          
          arr=(
            "chore(bot): 💩 auto commit"
            "chore(bot): 💩💩 auto commit"
            "chore(bot): 💩💩💩 auto commit"
            "chore(bot): 💩💩💩💩 auto commit"
            "chore(bot): 💩💩💩💩💩 auto commit"
            "chore(bot): 💩💩💩💩💩💩 auto commit"
            "chore(bot): 💩💩💩💩💩💩💩 auto commit"
          )
          # Guess which 💩 day tomorrow is?
          rand=$((RANDOM % ${#arr[@]}))
          
          git commit -m "${arr[$rand]}"
          
      - name: GitHub Push
        run: |
          git push origin main  
